<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline WebLLM Multi-Model Chat</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #111;
      color: #eee;
    }
    .card {
      max-width: 900px;
      margin: 0 auto;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 18px;
      background: #181818;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 22px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
    }
    select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid #333;
      background: #222;
      color: #eee;
      padding: 10px 12px;
      font-size: 15px;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    button {
      cursor: pointer;
      font-weight: 700;
      background: #2b2b2b;
    }
    button:hover {
      background: #333;
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    #status {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #202020;
      border: 1px solid #303030;
      min-height: 20px;
      white-space: pre-wrap;
    }
    #output {
      margin-top: 12px;
      white-space: pre-wrap;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px;
      min-height: 120px;
      background: #141414;
    }
    .hint {
      margin-top: 8px;
      color: #aaa;
      font-size: 13px;
      line-height: 1.4;
    }
    .small {
      font-size: 12px;
      color: #9a9a9a;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🧠 Offline WebLLM Chat</h1>

    <div class="row">
      <div>
        <label for="modelSelect">Model</label>
        <select id="modelSelect">
          <option value="Llama-3-8B-Instruct-q4f32_1-MLC">Llama 3 8B</option>
          <option value="Llama-3-1B-Instruct-q4f16_1-MLC">Llama 3 1B</option>
          <option value="Phi-3-mini-4k-instruct-q4f16_1-MLC">Phi-3 Mini</option>
        </select>
      </div>
      <div>
        <label for="temperature">Temperature</label>
        <select id="temperature">
          <option value="0.2">0.2</option>
          <option value="0.5" selected>0.5</option>
          <option value="0.7">0.7</option>
          <option value="1.0">1.0</option>
        </select>
      </div>
    </div>

    <div class="btn-row">
      <button id="loadBtn" type="button">Load Model</button>
      <button id="clearBtn" type="button">Clear Output</button>
    </div>

    <div id="status">Idle</div>

    <label for="prompt">Prompt</label>
    <textarea id="prompt" placeholder="Type your prompt here..."></textarea>

    <div class="btn-row">
      <button id="genBtn" type="button">Generate</button>
      <button id="stopBtn" type="button" disabled>Stop</button>
    </div>

    <div id="output"></div>
    <div class="hint">
      First load may need network access. After files are cached, the app can run offline.
    </div>
    <div class="small">
      Note: this uses WebLLM via module import. If the browser does not support WebGPU, loading may fail.
    </div>
  </div>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const state = {
      engine: null,
      abortController: null,
      loadedModel: null,
    };

    const els = {
      modelSelect: document.getElementById("modelSelect"),
      temperature: document.getElementById("temperature"),
      loadBtn: document.getElementById("loadBtn"),
      clearBtn: document.getElementById("clearBtn"),
      genBtn: document.getElementById("genBtn"),
      stopBtn: document.getElementById("stopBtn"),
      status: document.getElementById("status"),
      prompt: document.getElementById("prompt"),
      output: document.getElementById("output"),
    };

    function setStatus(text) {
      els.status.textContent = text;
    }

    function setBusy(busy) {
      els.loadBtn.disabled = busy;
      els.genBtn.disabled = busy;
      els.modelSelect.disabled = busy;
      els.temperature.disabled = busy;
      els.stopBtn.disabled = !busy;
    }

    async function loadModel() {
      const modelId = els.modelSelect.value;

      try {
        setBusy(true);
        setStatus("Loading model...");
        els.output.textContent = "";

        state.engine = await webllm.CreateMLCEngine(modelId, {
          initProgressCallback: (progress) => {
            if (typeof progress?.progress === "number") {
              const pct = (progress.progress * 100).toFixed(1);
              setStatus(`Loading ${modelId}: ${pct}%`);
            } else if (progress?.text) {
              setStatus(progress.text);
            }
          },
        });

        state.loadedModel = modelId;
        setStatus(`✅ Ready: ${modelId}`);
      } catch (err) {
        console.error(err);
        state.engine = null;
        state.loadedModel = null;
        setStatus(`❌ Load failed: ${err?.message || err}`);
      } finally {
        setBusy(false);
      }
    }

    async function generate() {
      if (!state.engine) {
        setStatus("Load a model first.");
        return;
      }

      const prompt = els.prompt.value.trim();
      if (!prompt) {
        setStatus("Type a prompt first.");
        return;
      }

      const temperature = Number(els.temperature.value);
      const messages = [{ role: "user", content: prompt }];

      try {
        setBusy(true);
        els.output.textContent = "";
        setStatus(`Generating with ${state.loadedModel}...`);

        state.abortController = new AbortController();

        const stream = await state.engine.chat.completions.create({
          messages,
          temperature,
          max_tokens: 256,
          stream: true,
          signal: state.abortController.signal,
        });

        let fullText = "";
        for await (const chunk of stream) {
          const delta = chunk.choices?.[0]?.delta?.content || "";
          fullText += delta;
          els.output.textContent = fullText;
        }

        setStatus(`✅ Done with ${state.loadedModel}`);
      } catch (err) {
        if (err?.name === "AbortError") {
          setStatus("⏹️ Generation stopped.");
        } else {
          console.error(err);
          setStatus(`❌ Generation failed: ${err?.message || err}`);
        }
      } finally {
        state.abortController = null;
        setBusy(false);
      }
    }

    function stopGeneration() {
      if (state.abortController) {
        state.abortController.abort();
      }
    }

    function clearOutput() {
      els.output.textContent = "";
      els.prompt.value = "";
      setStatus(state.loadedModel ? `Ready: ${state.loadedModel}` : "Idle");
    }

    function runSmokeTests() {
      console.assert(typeof loadModel === "function", "loadModel should be defined");
      console.assert(typeof generate === "function", "generate should be defined");
      console.assert(!!els.loadBtn && !!els.genBtn, "Buttons should exist");
      console.assert(!!els.modelSelect && !!els.prompt, "Inputs should exist");
    }

    window.addEventListener("DOMContentLoaded", () => {
      els.loadBtn.addEventListener("click", loadModel);
      els.genBtn.addEventListener("click", generate);
      els.stopBtn.addEventListener("click", stopGeneration);
      els.clearBtn.addEventListener("click", clearOutput);

      if (!("gpu" in navigator)) {
        setStatus("⚠️ WebGPU not supported in this browser. Model loading may fail.");
      }

      runSmokeTests();
    });
  </script>
</body>
</html>
