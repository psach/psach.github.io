<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahaj Samadhi Meditation</title>
  <style>
    :root {
      --bg: #f7f3ee;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #7c3aed;
      --accent2: #ec4899;
      --border: #e5e7eb;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#fff7ed,var(--bg));
      display:grid;
      place-items:center;
      min-height:100vh;
      padding:24px;
      color:var(--text);
    }
    .wrap{width:100%;max-width:520px}
    .card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:24px;
      padding:28px 20px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }
    .avatar{
      width:88px;
      height:88px;
      border-radius:50%;
      margin:auto;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;
      display:grid;
      place-items:center;
      font-size:32px;
      font-weight:bold;
    }
    h1{margin:16px 0 8px}
    .subtitle{color:var(--muted);margin-bottom:24px}
    .links{display:grid;gap:14px}
    .link{
      display:flex;
      justify-content:space-between;
      align-items:center;
      text-decoration:none;
      color:inherit;
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
    }
    .left{display:flex;align-items:center;gap:14px}
    .icon{
      width:44px;
      height:44px;
      border-radius:12px;
      display:grid;
      place-items:center;
      color:#fff;
      font-weight:bold;
    }
    .yt{background:#ef4444}
    .s1{background:#7c3aed}
    .s2{background:#ec4899}
    .title{font-weight:bold}
    .desc{font-size:.9rem;color:var(--muted)}
  </style>
</head>
<body>

<div class="wrap">
  <div class="card">

    <div class="avatar">SS</div>

    <h1>Sahaj Samadhi Meditation</h1>
    <p class="subtitle">Official Registration & Information Links</p>

    <div class="links">

      <a class="link" href="https://youtube.com/shorts/00yzR6lkV4w?si=iIMk5Q3mzRQwMaBy" target="_blank">
        <div class="left">
          <div class="icon yt">▶</div>
          <div>
            <div class="title">YouTube Video</div>
            <div class="desc">Watch introduction</div>
          </div>
        </div>
        ➜
      </a>

      <a class="link" href="https://aolt.in/1022107" target="_blank">
        <div class="left">
          <div class="icon s1">1</div>
          <div>
            <div class="title">Nisha Barve Ji Session</div>
            <div class="desc">Register here</div>
          </div>
        </div>
        ➜
      </a>

      <a class="link" href="https://aolt.in/1031563" target="_blank">
        <div class="left">
          <div class="icon s2">2</div>
          <div>
            <div class="title">Sushma Ji Session</div>
            <div class="desc">Register here</div>
          </div>
        </div>
        ➜
      </a>

    </div>

  </div>
</div>

</body>
</html>
